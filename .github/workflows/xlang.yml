name: Cross-language ABI

# Proves the C++, Rust and Swift ports share one byte-exact wire ABI
# (context/xlang-channel-abi.md) by running every writer->reader pairing over
# an ipc::route channel and checking the payload round-trips byte-for-byte.
# Same-language test suites do NOT catch ABI drift — this matrix does.
#
# The matrix is planned and executed by tools/xlang-runner (config:
# tools/xlang-ci.toml). Scenarios: sync, fanout (1 writer -> N mixed-language
# readers), channel (multi-writer, expected-fail: known ABI gap), reap
# (dead-connection reaping + probe/traffic edges), primitives (mutex/
# semaphore/condition, with known gaps expected-fail), typed (codec layer),
# async (notify wakeup), and secure + secure-badkey + secure-negative (AEAD
# envelope interop, fail-closed on wrong key/key id/tamper/algorithm).

# Push triggers disabled to conserve CI budget; run manually via the Actions tab
# (workflow_dispatch) or on pull requests.
on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]

jobs:
  # Linux runners have no Swift toolchain in this project, so the Linux matrix
  # covers the C++ <-> Rust pairings (sync + reap + secure).
  matrix-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install GCC 14 and OpenSSL headers
      run: sudo apt-get update && sudo apt-get install -y g++-14 libssl-dev
    - name: Build C++ harness (secure codec enabled)
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_SECURE_OPENSSL=ON .
        make xlang_ipc -j
      working-directory: cpp/libipc
      env:
        CC: gcc-14
        CXX: g++-14
    - name: Build Rust harness (secure + typed codecs enabled)
      run: cargo build --release --bin xlang --features secure-crypto-openssl,codec-protobuf
      working-directory: rust/libipc
      env:
        LIBIPC_OPENSSL_PREFIX: /usr
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    # No --scenario filter: every scenario with participants runs (async has
    # none in this job; its endpoints are built in the async jobs).
    - name: Run cross-language matrix (cpp, rust)
      run: |
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --require cpp,rust --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_BIN: cpp/libipc/bin/xlang_ipc
        XLANG_RUST_BIN: rust/libipc/target/release/xlang
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-linux
        path: xlang-results.xml

  # macOS runners have C++, Rust and Swift — the full 3x3 matrix
  # (sync + reap + secure).
  matrix-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Build C++ harness (secure codec enabled)
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -DLIBIPC_BUILD_TESTS=ON \
              -DLIBIPC_SECURE_OPENSSL=ON \
              -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" .
        make xlang_ipc -j
      working-directory: cpp/libipc
    - name: Build Rust harness (secure + typed codecs enabled)
      run: cargo build --release --bin xlang --features secure-crypto-openssl,codec-protobuf
      working-directory: rust/libipc
      env:
        LIBIPC_OPENSSL_PREFIX: /opt/homebrew/opt/openssl@3
    - name: Build Swift harness (secure codec enabled)
      run: swift build -c release --product xlang-harness
      working-directory: swift/libipc
      env:
        LIBIPC_SECURE_OPENSSL: "1"
        LIBIPC_OPENSSL_PREFIX: /opt/homebrew/opt/openssl@3
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    # No --scenario filter: every scenario with participants runs.
    - name: Run cross-language matrix (cpp, rust, swift)
      run: |
        export XLANG_SWIFT_BIN="$(cd swift/libipc && swift build -c release --product xlang-harness --show-bin-path)/xlang-harness"
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --require cpp,rust,swift --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_BIN: cpp/libipc/bin/xlang_ipc
        XLANG_RUST_BIN: rust/libipc/target/release/xlang
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-macos
        path: xlang-results.xml

  # Async (Layer 1 notify + Layer 2) matrix: a writer's notify must wake an async
  # receiver on the readiness fd. C++ uses stdexec async_recv + libnotify (macOS)
  # / FIFO (Linux); Rust uses AsyncRoute + the same backends. Divergent notify
  # keys fail a pairing. The C++ async endpoint needs stdexec (fetched) + C++23.
  async-matrix-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install GCC 14
      run: sudo apt-get update && sudo apt-get install -y g++-14
    - name: Build C++ async harness (FIFO notify backend)
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_STDEXEC=ON .
        make xasync xcoro -j
      working-directory: cpp/libipc
      env:
        CC: gcc-14
        CXX: g++-14
    - name: Build Rust async harness
      run: cargo build --release --bin xlang --features async-tokio
      working-directory: rust/libipc
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    - name: Run async matrix (cpp, rust)
      run: |
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --scenario async \
          --require cpp-async,cpp-coro,rust-async --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_ASYNC_BIN: cpp/libipc/bin/xasync
        XLANG_CPP_CORO_BIN: cpp/libipc/bin/xcoro
        XLANG_RUST_ASYNC_BIN: rust/libipc/target/release/xlang
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-async-linux
        path: xlang-results.xml

  async-matrix-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Build C++ async harness (libnotify backend)
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_STDEXEC=ON .
        make xasync xcoro -j
      working-directory: cpp/libipc
    - name: Build Rust async harness
      run: cargo build --release --bin xlang --features async-tokio
      working-directory: rust/libipc
    - name: Build Swift harness (Layer 1 notify + AsyncRoute)
      run: swift build -c release --product xlang-harness
      working-directory: swift/libipc
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    - name: Run async matrix (cpp, rust, swift)
      run: |
        export XLANG_SWIFT_ASYNC_BIN="$(cd swift/libipc && swift build -c release --product xlang-harness --show-bin-path)/xlang-harness"
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --scenario async \
          --require cpp-async,cpp-coro,rust-async,swift-async --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_ASYNC_BIN: cpp/libipc/bin/xasync
        XLANG_CPP_CORO_BIN: cpp/libipc/bin/xcoro
        XLANG_RUST_ASYNC_BIN: rust/libipc/target/release/xlang
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-async-macos
        path: xlang-results.xml

  # Windows runners have C++ (MSVC) and Rust (Swift is a macOS-only SwiftPM
  # package). Covers the byte-exact wire ABI (named auto-reset condition var,
  # AlignSize=8, verbatim Local\ object names) and the reaper (GetProcessTimes
  # start token). MSVC is a multi-config generator: outputs land in
  # build/bin/Release/*.exe, unlike the Makefile bin/ on Linux/macOS.
  matrix-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install OpenSSL (Win64, for the secure scenarios)
      run: choco install openssl --no-progress -y
    - name: Build C++ harness (MSVC, secure codec enabled)
      run: |
        cmake -B build -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_SECURE_OPENSSL=ON \
              -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64"
        cmake --build build --config Release --target xlang_ipc
      working-directory: cpp/libipc
    - name: Build Rust harness (secure + typed codecs enabled)
      run: cargo build --release --bin xlang --features secure-crypto-openssl,codec-protobuf
      working-directory: rust/libipc
      env:
        LIBIPC_OPENSSL_PREFIX: C:/Program Files/OpenSSL-Win64
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    # No --scenario filter: every scenario with participants runs.
    - name: Run cross-language matrix (cpp, rust)
      run: |
        # OpenSSL's libcrypto-3-x64.dll must be on PATH at run time.
        export PATH="/c/Program Files/OpenSSL-Win64/bin:$PATH"
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --require cpp,rust --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_BIN: cpp/libipc/build/bin/Release/xlang_ipc.exe
        XLANG_RUST_BIN: rust/libipc/target/release/xlang.exe
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-windows
        path: xlang-results.xml

  # Async (Layer 1 notify + Layer 2) matrix on Windows: a sender's SetEvent must
  # wake an async receiver. C++ uses stdexec async_recv + coroutines over the
  # named-Event backend and a RegisterWaitForSingleObject reactor; Rust uses
  # AsyncRoute (thread-pool wait + tokio Notify). stdexec is fetched (needs C++23).
  async-matrix-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Build C++ async harness (named-Event backend)
      run: |
        cmake -B build -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_STDEXEC=ON
        cmake --build build --config Release --target xasync xcoro
      working-directory: cpp/libipc
    - name: Build Rust async harness
      run: cargo build --release --bin xlang --features async-tokio
      working-directory: rust/libipc
    - name: Build matrix runner
      run: cargo build --release --manifest-path tools/xlang-runner/Cargo.toml
    - name: Run async matrix (cpp, rust, coro)
      run: |
        tools/xlang-runner/target/release/xlang-runner \
          --config tools/xlang-ci.toml \
          --scenario async \
          --require cpp-async,cpp-coro,rust-async --strict-caps \
          --junit xlang-results.xml
      env:
        XLANG_CPP_ASYNC_BIN: cpp/libipc/build/bin/Release/xasync.exe
        XLANG_CPP_CORO_BIN: cpp/libipc/build/bin/Release/xcoro.exe
        XLANG_RUST_ASYNC_BIN: rust/libipc/target/release/xlang.exe
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: xlang-results-async-windows
        path: xlang-results.xml
