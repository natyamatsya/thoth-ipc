name: C/C++ CI

# Push triggers disabled to conserve CI budget; run manually via the Actions tab
# (workflow_dispatch) or on pull requests.
on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: check dependency versions against versions.json
      run: python3 tools/check_versions.py
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install GCC 14 (std::print support)
      run: sudo apt-get update && sudo apt-get install -y g++-14
    - name: cmake
      run: cmake -DCMAKE_BUILD_TYPE=Release -DTHOTH_IPC_BUILD_TESTS=ON -DTHOTH_IPC_BUILD_PROTO=ON .
      working-directory: cpp/thoth-ipc
      env:
        CC: gcc-14
        CXX: g++-14
    - name: make
      run: make -j
      working-directory: cpp/thoth-ipc
    - name: test
      run: export LD_LIBRARY_PATH=./lib:$LD_LIBRARY_PATH && ./bin/test-ipc
      working-directory: cpp/thoth-ipc
    - name: verify Rust service
      run: test -x ./bin/rt_audio_service_rs
      working-directory: cpp/thoth-ipc
    - name: verify C++23 demo services
      run: test -x ./bin/audio_service && test -x ./bin/rt_audio_service
      working-directory: cpp/thoth-ipc

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: cmake
      run: cmake -DCMAKE_BUILD_TYPE=Release -DTHOTH_IPC_BUILD_TESTS=ON -DTHOTH_IPC_BUILD_BENCHMARKS=ON -DTHOTH_IPC_BUILD_PROTO=ON .
      working-directory: cpp/thoth-ipc
    - name: make
      run: make -j
      working-directory: cpp/thoth-ipc
    - name: test
      run: ./bin/test-ipc
      working-directory: cpp/thoth-ipc
    - name: benchmark
      run: ./bin/bench_ipc 4
      working-directory: cpp/thoth-ipc
    - name: verify Rust service
      run: test -x ./bin/rt_audio_service_rs
      working-directory: cpp/thoth-ipc

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: cmake
      run: cmake -B build -DTHOTH_IPC_BUILD_TESTS=ON -DTHOTH_IPC_BUILD_PROTO=ON
      working-directory: cpp/thoth-ipc
    - name: build
      run: cmake --build build --config Release
      working-directory: cpp/thoth-ipc
    - name: test
      run: build\bin\Release\test-ipc.exe
      working-directory: cpp/thoth-ipc
    - name: verify Rust service
      run: if (!(Test-Path build\bin\Release\rt_audio_service_rs.exe)) { exit 1 }
      working-directory: cpp/thoth-ipc

  build-macos-file-shm:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cmake
      run: cmake -DCMAKE_BUILD_TYPE=Release -DTHOTH_IPC_BUILD_TESTS=ON -DTHOTH_IPC_USE_FILE_SHM=ON .
      working-directory: cpp/thoth-ipc
    - name: make
      run: make -j
      working-directory: cpp/thoth-ipc
    - name: test
      run: ./bin/test-ipc
      working-directory: cpp/thoth-ipc

  build-macos-universal:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cmake
      run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" .
      working-directory: cpp/thoth-ipc
    - name: make
      run: make -j
      working-directory: cpp/thoth-ipc
    - name: verify architectures
      run: lipo -info lib/libthoth_ipc.a
      working-directory: cpp/thoth-ipc
