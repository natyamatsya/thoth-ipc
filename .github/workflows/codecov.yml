name: Upload CodeCov Report

# Push triggers disabled to conserve CI budget; run manually via the Actions tab
# (workflow_dispatch) or on pull requests.
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build:
  
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure
      run: cmake -DCMAKE_BUILD_TYPE=Debug -DLIBIPC_BUILD_TESTS=ON -DLIBIPC_CODECOV=ON .
      working-directory: cpp/libipc

    - name: Build
      run: make -j
      working-directory: cpp/libipc

    - name: Test
      env:
        LD_LIBRARY_PATH: ./bin
      run: ./bin/test-ipc
      working-directory: cpp/libipc

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        verbose: true
        exclude: |
          3rdparty/**
          test/**
          demo/**
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}